name: Release Windows Standalone

on:
  push:
    tags:
      - 'windows-v[0-9]*'

permissions:
  contents: read

jobs:
  release-windows-standalone:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26.3"
          cache-dependency-path: backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          package_json_file: frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          VERSION="${GITHUB_REF_NAME#windows-v}"
          cd frontend
          pnpm install --frozen-lockfile
          VITE_APP_VERSION="$VERSION" pnpm build

      - name: Generate swagger docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.4
          cd backend
          swag init -d . -g cmd/main.go -o swagger

      - name: Download Go modules
        run: |
          cd backend
          go mod download

      - name: Prepare embedded assets
        run: |
          cd backend
          rm -rf ui/build
          cp -r ../frontend/dist ui/build
          cp -r ../assets/tools/win-x64/. embedded_tools/win-x64/

      - name: Cross-compile Windows amd64 binary
        run: |
          cd backend
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-s -w" \
            -o ../databasus.exe \
            ./cmd
          rm -rf embedded_tools/win-x64
          mkdir -p embedded_tools/win-x64
          touch embedded_tools/win-x64/.gitkeep

      - name: Package standalone distribution
        run: |
          zip databasus-windows-x64.zip databasus.exe install-service.bat install-service.ps1

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            databasus-windows-x64.zip \
            --repo "${{ github.repository }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
